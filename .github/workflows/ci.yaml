name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --only-group dev

      - name: gitleaks check
        run: docker run -v "${{ github.workspace }}":/src zricethezav/gitleaks:latest dir /src/llm_engineering

      - name: Lint check [Python]
        run: uv run ruff check .

      - name: Format check [Python]
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: uv sync

      - name: Run tests
        run: uv run poe test
